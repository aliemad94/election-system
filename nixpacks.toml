[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "cp prisma/schema.postgres.prisma prisma/schema.prisma",
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npx prisma db push --skip-generate && npx prisma db seed && node .next/standalone/server.js"
