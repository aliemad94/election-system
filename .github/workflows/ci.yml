# ════════════════════════════════════════════════════════════════════
# خط أنابيب التكامل المستمر — منظومة الماكينة الانتخابية
# CI Pipeline — Electoral Machine Management System
# ════════════════════════════════════════════════════════════════════
# يعمل عند كل دفعة لـ main وكل طلب دمج (PR)
# Runs on every push to main and every pull request targeting main
# ════════════════════════════════════════════════════════════════════

name: "CI — Build Verification & Auto-Rollback"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# منع التشغيلات المتداخلة لنفس الفرع/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# صلاحيات الكتابة مطلوبة للتراجع التلقائي وفتح Issues
permissions:
  contents: write
  issues: write

env:
  NODE_VERSION: "20"
  # متغيرات بيئة وهمية للبناء فقط — ليست أسرار حقيقية
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  JWT_SECRET: "ci-build-only-not-a-real-secret-do-not-use-in-production"
  ADMIN_PASSWORD: "CiBuildOnly!2026"
  USER_PASSWORD: "CiBuildOnly!2026"
  ALLOW_INSECURE_SEED_DEFAULTS: "true"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # الوظيفة 1: بوابة الجودة — فحص الأكواد والأنواع والثغرات
  # Job 1: Quality Gate — Lint, Type-Check, Security Audit
  # ──────────────────────────────────────────────────────────────────
  quality-gate:
    name: "🔍 Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "📦 Cache node_modules"
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: "📦 Install dependencies (npm ci)"
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: "⚙️ Generate Prisma Client"
        run: npx prisma generate

      - name: "🔎 TypeScript Type-Check (tsc --noEmit)"
        run: npx tsc --noEmit

      - name: "🧹 ESLint Check"
        run: npm run lint

      - name: "🛡️ Security Audit (high + critical)"
        run: npm audit --audit-level=high || true
        # npm audit returns non-zero on vulnerabilities; we log but don't block
        # because xlsx has a known accepted vulnerability

  # ──────────────────────────────────────────────────────────────────
  # الوظيفة 2: اختبارات الوحدة
  # Job 2: Unit Tests (Vitest)
  # ──────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "📦 Cache node_modules"
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: "📦 Install dependencies"
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: "⚙️ Generate Prisma Client"
        run: npx prisma generate

      - name: "🧪 Run Vitest"
        run: npm test

  # ──────────────────────────────────────────────────────────────────
  # الوظيفة 3: بناء نسخة الإنتاج
  # Job 3: Production Build Verification
  # ──────────────────────────────────────────────────────────────────
  build:
    name: "🏗️ Production Build"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "📦 Cache node_modules"
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: "📦 Install dependencies"
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: "⚙️ Generate Prisma Client"
        run: npx prisma generate

      - name: "🔨 Cache Next.js build"
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: "🏗️ Build production bundle"
        run: npx next build --webpack

      - name: "📤 Upload build artifact"
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build-${{ github.sha }}
          path: .next/standalone
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # الوظيفة 4: فحص بناء Docker (فقط على main)
  # Job 4: Docker Build Smoke Test (main only)
  # ──────────────────────────────────────────────────────────────────
  docker-verify:
    name: "🐳 Docker Build Verify"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐳 Build Docker image"
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            -t election-system:ci-${{ github.sha }} \
            .

      - name: "✅ Docker build succeeded"
        run: echo "Docker image built successfully — election-system:ci-${{ github.sha }}"

  # ──────────────────────────────────────────────────────────────────
  # الوظيفة 5: التراجع التلقائي عند فشل البناء على main
  # Job 5: Auto-Rollback on main failure
  # ──────────────────────────────────────────────────────────────────
  rollback:
    name: "🚨 Auto-Rollback"
    runs-on: ubuntu-latest
    needs: [quality-gate, test, build, docker-verify]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: "📥 Checkout code (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔄 Revert last commit"
        run: |
          FAILED_SHA="${{ github.sha }}"
          FAILED_MSG=$(git log -1 --pretty=format:'%s' HEAD)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "⚠️ Reverting commit ${FAILED_SHA}: ${FAILED_MSG}"
          git revert HEAD --no-edit

          git push origin main
          echo "✅ Revert pushed successfully"

      - name: "📋 Create rollback issue"
        uses: actions/github-script@v7
        with:
          script: |
            const failedSha = context.sha;
            const shortSha = failedSha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 CI Rollback: commit ${shortSha} reverted automatically`,
              labels: ['ci-rollback', 'bug'],
              body: [
                `## ⚠️ تراجع تلقائي — CI Auto-Rollback`,
                ``,
                `**Commit المُتراجع عنه:** \`${failedSha}\``,
                `**السبب:** فشل خط أنابيب CI (Build Verification Pipeline)`,
                `**سجلات التشغيل:** [عرض السجلات](${runUrl})`,
                ``,
                `### ماذا حدث؟`,
                `تم دفع commit لفرع \`main\` وفشل أحد فحوصات الـ CI التالية:`,
                `- 🔍 بوابة الجودة (TypeScript / ESLint / Security)`,
                `- 🧪 اختبارات الوحدة (Vitest)`,
                `- 🏗️ بناء الإنتاج (Next.js Build)`,
                `- 🐳 فحص Docker`,
                ``,
                `### الإجراء المطلوب`,
                `1. راجع [سجلات التشغيل](${runUrl}) لمعرفة سبب الفشل`,
                `2. أصلح المشكلة في فرع جديد`,
                `3. افتح طلب دمج (PR) للتحقق قبل الدمج`,
                ``,
                `---`,
                `*تم إنشاء هذا التقرير تلقائياً بواسطة CI Auto-Rollback* 🤖`,
              ].join('\n'),
            });
